# YPAT development environment
# 本地开发使用，端口仅绑 127.0.0.1，禁止公网访问
# 使用 docker compose up -d 启动
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${YPAT_LOCAL_MYSQL_ROOT_PASSWORD:?YPAT_LOCAL_MYSQL_ROOT_PASSWORD is required}"
      MYSQL_DATABASE: ypat
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${YPAT_LOCAL_MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/dev-init.sql:/docker-entrypoint-initdb.d/dev-init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password --skip-character-set-client-handshake --init-connect='SET NAMES utf8mb4'
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  redis:
    # 与 staging 服务器数据卷已写入的 RDB 版本对齐（stable 服务器上 AOF 由
    # redis:7-alpine (7.4) 写入，7.2 读不了）。
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${YPAT_LOCAL_REDIS_PASSWORD:?YPAT_LOCAL_REDIS_PASSWORD is required}"
    ports:
      - "127.0.0.1:${YPAT_LOCAL_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${YPAT_LOCAL_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  eureka:
    build:
      context: ./backend-base
      dockerfile: base-eureka/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${YPAT_LOCAL_EUREKA_PORT:-8761}:8761"
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  restapi:
    build:
      context: ./backend
      dockerfile: system-restapi/Dockerfile
    restart: unless-stopped
    expose:
      - "9081"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/ypat?characterEncoding=utf8&useSSL=false"
      SPRING_DATASOURCE_USERNAME: "${YPAT_DB_USERNAME:?YPAT_DB_USERNAME is required}"
      SPRING_DATASOURCE_PASSWORD: "${YPAT_DB_PASSWORD:?YPAT_DB_PASSWORD is required}"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: "${YPAT_LOCAL_REDIS_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      YPAT_FDFS_PUBLIC_BASE_URL: "${YPAT_FDFS_PUBLIC_BASE_URL:-https://fastdfs.panghu.work/}"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9081/health"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  wap:
    build:
      context: ./backend
      dockerfile: system-wap/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${YPAT_LOCAL_WAP_PORT:-8081}:8081"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      # ca2a4653 起 wap 内部有 @Autowired Repository，需要直连 MySQL
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/ypat?characterEncoding=utf8&useSSL=false"
      SPRING_DATASOURCE_USERNAME: "${YPAT_DB_USERNAME:?YPAT_DB_USERNAME is required}"
      SPRING_DATASOURCE_PASSWORD: "${YPAT_DB_PASSWORD:?YPAT_DB_PASSWORD is required}"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: "${YPAT_LOCAL_REDIS_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      YPAT_FDFS_PUBLIC_BASE_URL: "${YPAT_FDFS_PUBLIC_BASE_URL:-https://fastdfs.panghu.work/}"
      YPAT_STORAGE_PROVIDER: "${YPAT_STORAGE_PROVIDER:-fastdfs}"
      YPAT_COS_SECRET_ID: "${YPAT_COS_SECRET_ID:-}"
      YPAT_COS_SECRET_KEY: "${YPAT_COS_SECRET_KEY:-}"
      YPAT_COS_REGION: "${YPAT_COS_REGION:-ap-guangzhou}"
      YPAT_COS_BUCKET: "${YPAT_COS_BUCKET:-}"
      YPAT_COS_PUBLIC_BASE_URL: "${YPAT_COS_PUBLIC_BASE_URL:-}"
      YPAT_COS_ENV_PREFIX: "${YPAT_COS_ENV_PREFIX:-dev}"
      YPAT_WX_APP_ID: "${YPAT_WX_APP_ID:-wx37ee5a90fc7ecb21}"
      YPAT_WX_APP_SECRET: "${YPAT_WX_APP_SECRET:-}"
      YPAT_WX_PAY_MODE: "${YPAT_WX_PAY_MODE:-PUBLIC_KEY}"
      YPAT_WX_H5_APP_ID: "${YPAT_WX_H5_APP_ID:-${YPAT_WX_APP_ID:-wx37ee5a90fc7ecb21}}"
      YPAT_WX_MCH_ID: "${YPAT_WX_MCH_ID:-}"
      YPAT_WX_MCH_SERIAL_NO: "${YPAT_WX_MCH_SERIAL_NO:-}"
      YPAT_WX_MCH_PRIVATE_KEY_PATH: "${YPAT_WX_MCH_PRIVATE_KEY_PATH:-/run/secrets/wechat-pay/apiclient_key.pem}"
      YPAT_WX_API_V3_KEY: "${YPAT_WX_API_V3_KEY:-}"
      YPAT_WX_PAY_PUBLIC_KEY_ID: "${YPAT_WX_PAY_PUBLIC_KEY_ID:-}"
      YPAT_WX_PAY_PUBLIC_KEY_PATH: "${YPAT_WX_PAY_PUBLIC_KEY_PATH:-/run/secrets/wechat-pay/pub_key.pem}"
      YPAT_WX_NOTIFY_URL: "${YPAT_WX_NOTIFY_URL:-}"
      YPAT_WX_H5_SCENE_INFO: "${YPAT_WX_H5_SCENE_INFO:-}"
    volumes:
      - "${YPAT_WX_PAY_SECRET_DIR:-./docker/secrets/wechat-pay}:/run/secrets/wechat-pay:ro"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka:
        condition: service_healthy
      restapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/internal/health/dependencies"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  system-web:
    build:
      context: ./backend
      dockerfile: system-web/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${YPAT_LOCAL_WEB_PORT:-8082}:8082"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: "${YPAT_LOCAL_REDIS_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      YPAT_FDFS_PUBLIC_BASE_URL: "${YPAT_FDFS_PUBLIC_BASE_URL:-https://fastdfs.panghu.work/}"
    depends_on:
      redis:
        condition: service_healthy
      eureka:
        condition: service_healthy
      restapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  admin-web:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        APP_ENV: docker
    restart: unless-stopped
    ports:
      - "127.0.0.1:18896:8080"
    depends_on:
      wap:
        condition: service_healthy
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
      - "172.20.10.4:8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist/build/h5:/usr/share/nginx/html:ro
    depends_on:
      wap:
        condition: service_healthy
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  mysql_data:
  redis_data:

networks:
  ypat_ypat-net:
    name: ypat_ypat-net
    driver: bridge
