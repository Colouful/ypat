<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorator="fragments/layout">
<head>
    <title>审核系统</title>

    <link th:href="@{/scripts/pagination/pagination.css}" rel="stylesheet" type="text/css" />
    <link th:href="@{/scripts/artDialog/default.css}" rel="stylesheet" type="text/css" />
    <link th:href="@{/scripts/My97DatePicker/skin/WdatePicker.css}" rel="stylesheet" type="text/css" />
    <link th:href="@{/scripts/slider/jquery.slider.css}" rel="stylesheet" type="text/css" />

    <script th:src="@{/scripts/pagination/jquery.pagination.js}"></script>
    <script th:src="@{/scripts/jquery.smartselect-1.1.min.js}"></script>
    <script th:src="@{/scripts/artDialog/artDialog.js}" />
    <script th:src="@{/scripts/My97DatePicker/WdatePicker.js}"></script>
    <script th:src="@{/scripts/manage/list.js}"></script>
    <!--<script th:src="@{/scripts/imgZoom/jquery.mousewheel.js}"></script>-->
    <!--<script th:src="@{/scripts/imgZoom/jquery.imgZoom.js}"></script>-->
    <!--<script th:src="@{/scripts/imgZoom/jquery.drag.js}"></script>-->
</head>
<body>
<div class="locationLine" layout:fragment="prompt">
    当前位置：首页 &gt; <em >申请列表</em>
</div>
<div class="statisticBox w-782"  layout:fragment="content">
    <form id="queryForm" method="get">
    <div class="radiusGrayBox782">
        <div class="radiusGrayTop782"></div>
        <div class="radiusGrayMid782">
            <div class="dataSearchBox forUserRadius">
                <ul>
                    <li>
                        <label class="preInpTxt f-left">状&nbsp;&nbsp;&nbsp;态：</label>
                        <select class="inp-list w-200 clear-mr f-left" name="status" id="status">
                            <option th:value="1" th:text="待审核" ></option>
                            <option th:value="2" th:text="审核通过" ></option>
                            <option th:value="3" th:text="审核未通过" ></option>
                        </select>
                    </li>
                    <li>
                        <label class="preInpTxt f-left">用户名：</label>
                        <input type="text" class="inp-list w-200 clear-mr f-left" id="nickname" name="nickname"/>
                    </li>
                    <li>
                        <label class="preInpTxt f-left">手机号：</label>
                        <input type="text" class="inp-list w-200 clear-mr f-left" id="mobile" name="mobile"/>
                    </li>
                    <li>
                        <label class="preInpTxt f-left">是否推荐：</label>
                        <select class="inp-list w-200 clear-mr f-left" name="recomflag" id="recomflag">
                            <option value="">全部</option>
                            <option th:value="0" th:text="否" ></option>
                            <option th:value="1" th:text="是" ></option>
                        </select>
                    </li>
                    <li style="float:right;">
                        <a href="javascript:void(0)" class="blueBtn-62X30 f-right" id="searchBtn">查询</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    </form>
    <div class="newBtnBox">
    </div>
    <div class="dataDetailList mt-12">
        <table class="dataListTab">
            <thead>
            <tr>
                <th>ID</th>
                <th>性别</th>
                <th>昵称</th>
                <th>职业</th>
                <th>约拍对象</th>
                <th>发布地区</th>
                <th>发布时间</th>
                <th>状态</th>
                <th>是否推荐</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="tbodyContent">
            </tbody>
        </table>
        <div class="tableFootLine">
            <div class="pagebarList pagination"/>
        </div>
    </div>
</div>
</body>
</html>
