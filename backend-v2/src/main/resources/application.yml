# backend-v2 base configuration.
#
# PR-04 only — minimal so the Spring Boot context can boot cleanly.
# Profile-specific overrides land in application-dev.yml /
# application-staging.yml / application-prod.yml in later PRs.

server:
  port: 8082
  # Backend-v2 listens on 8082 so the existing system-wap (8081)
  # and system-restapi (9081) keep their ports during the cut-over.
  # Nginx will start routing selected prefixes here in PR-11.

spring:
  application:
    name: ypat-backend-v2

  # ── Flyway: PR-07a bootstrap. PR-07b produces the real baseline.
  # ────────────────────────────────────────────────────────────
  flyway:
    # Disabled in this PR. We don't yet have a real baseline to
    # apply (V1__baseline_schema.sql is still the .gitkeep-only
    # placeholder in db/migration/mysql/). Enabling this BEFORE
    # the baseline lands would either:
    #   - fail boot with "no migrations found", or
    #   - if baseline-on-migrate=true, attempt to baseline an
    #     empty migration set and confuse the schema_history table.
    # PR-07b flips enabled=true the moment V1__baseline_schema.sql
    # is committed.
    enabled: false

    # Baseline configuration is fixed at PR-07b, not here.
    # When enabled flips on:
    #   baseline-on-migrate: true   # don't error on non-empty DB
    #   baseline-version: 1          # V1__ is the baseline anchor
    #   locations: classpath:db/migration
    #   sql-migration-suffixes: .sql
    #   validate-on-migrate: true   # refuse drift from checksum

  # ── ddl-auto: PR-01b anchor.
  # ─────────────────────────────
  # Backend-v2 starts with `none` here too, matching the legacy
  # PR-01a fix. PR-12 / PR-01b flips this to `validate` once the
  # baseline is committed.
  jpa:
    hibernate:
      ddl-auto: none