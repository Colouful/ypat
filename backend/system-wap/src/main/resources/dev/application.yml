server:
  port: 8081
  tomcat:
    max-http-post-size: -1
spring:
  http:
    multipart:
      max-file-size: 200Mb
      max-request-size: 400Mb
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  redis:
    host: ${YPAT_REDIS_HOST:localhost}
    port: ${YPAT_REDIS_PORT:6379}
    password: ${YPAT_REDIS_PASSWORD:}
    pool:
      max-idle: 8
      min-idle: 0
      max-active: 8
      max-wait: -1
  jackson:
    time-zone: GMT+8
  # 数据源（wap 里 @Autowired 的 Repository 在 ca2a4653 引入，必须配 datasource
  # 才能启动。不显式指定 driver-class-name，让 Druid 走 SPI 自动加载，避开
  # Spring Boot 1.5.9 LaunchedURLClassLoader.definePackageIfNecessary NPE）
  datasource:
    url: ${YPAT_MYSQL_URL:jdbc:mysql://localhost:3306/ypat?characterEncoding=utf8&useSSL=false}
    username: ${YPAT_MYSQL_USERNAME:root}
    password: ${YPAT_MYSQL_PASSWORD:}
    initialSize: 2
    minIdle: 2
    maxActive: 10
    maxWait: 60000
    validationQuery: SELECT 1 FROM DUAL
    testWhileIdle: true
    testOnBorrow: false
    testOnReturn: false
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQL5Dialect
    hibernate:
      # PR-01a: `update` would auto-mutate schema. system-wap is
      # controller-only and does not own JPA, but we keep this
      # consistent with system-restapi to avoid future surprises.
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL5Dialect
        format_sql: false
    show-sql: false
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

system:
  third:
    # 本地开发上传到远程 FastDFS，返回可直接预览的 HTTPS 公网地址。
    fdfs_path: ${YPAT_FDFS_PUBLIC_BASE_URL:https://fastdfs.panghu.work/}
    storage:
      provider: ${YPAT_STORAGE_PROVIDER:cos}
      env_prefix: ${YPAT_COS_ENV_PREFIX:dev}


##FeignClient超时设置
---
spring.cloud.loadbalancer.retry.enabled: false
#hystrix.command.default.execution.isolation.thread.timeoutInMilliseconds: 10000
ribbon.ConnectTimeout: 250
ribbon.ReadTimeout: 5000
ribbon.OkToRetryOnAllOperations: false
ribbon.MaxAutoRetriesNextServer: 0
ribbon.MaxAutoRetries: 0
