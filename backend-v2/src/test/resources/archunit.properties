# ArchUnit global configuration for backend-v2.
#
# PR-06 ships with 11 empty module roots + the legacy code has
# zero Spring Modulith annotations. Many of the rules in
# ModulePackageStructureTest are therefore checking against an
# empty match set, which ArchUnit reports as a hard failure
# by default (failOnEmptyShould=true). That's wrong for this
# PR: empty should = "no current violation", not "rule broken".
#
# We flip the global default to false. Individual tests can
# still opt back in with ArchRule.allowEmptyShould(true) if
# they specifically want to assert "the module exists".
#
# Once business code lands in PR-11+ we may revisit this if
# we want stricter "module exists" guarantees.
archRule.failOnEmptyShould = false