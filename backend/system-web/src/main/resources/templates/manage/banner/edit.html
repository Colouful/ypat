<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorator="fragments/layout">
<head>
    <title>审核系统</title>
    <script th:src="@{/scripts/manage/banner/edit.js}"></script>
</head>
<body>
<div class="locationLine" layout:fragment="prompt">
    当前位置：首页 &gt; <em >横幅编辑</em>
</div>
<div class="statisticBox w-782"  layout:fragment="content">
    <form id="saveForm" action="./save" method="post" enctype="multipart/form-data" >
        <input type="hidden" name="id" id="id" th:value="${banner.id}"/>
        <table style="border-collapse:separate; border-spacing:10px;">
            <tr>
                <th>标题:</th>
                <td >
                    <input class="inp-list w-200 clear-mr f-left" type="text" th:value="${banner.title}" name="title" id="name" maxlength="20" />
                    <span class="tipStar f-left">*</span>
                </td>
            </tr>
            <tr>
                <th>状态:</th>
                <td>
                    <select class="inp-list w-200 clear-mr f-left" name="status" id="status" th:value="${banner.status}">
                        <option th:value="1" th:text="发布" th:field="${banner.status}" ></option>
                        <option th:value="2" th:text="撤回" th:field="${banner.status}" ></option>
                    </select>
                </td>
            </tr>
            <tr>
                <th>图片:</th>
                <td>
                    <input type="file" name="file" accept="image/*"/>
                </td>
            </tr>
        </table>
        <div class="bottomBtnBox">
            <a class="btn-93X38 saveBtn" href="javascript:void(0)">确定</a>
            <a class="btn-93X38 backBtn" href="javascript:backBtn()">返回</a>
        </div>
    </form>
</div>
</body>
</html>
