# 百度 AI（OCR + 人脸 + 智能小程序登录）
system.third.bd_api_idcard = https://aip.baidubce.com/rest/2.0/ocr/v1/idcard
system.third.bd_ak_idcard = ${YPAT_BD_IDCARD_AK:}
system.third.bd_sk_idcard = ${YPAT_BD_IDCARD_SK:}

system.third.bd_api_idmatch = https://aip.baidubce.com/rest/2.0/face/v3/person/idmatch
system.third.bd_ak_idmatch = ${YPAT_BD_IDMATCH_AK:}
system.third.bd_sk_idmatch = ${YPAT_BD_IDMATCH_SK:}

system.third.bd_key = ${YPAT_BD_APP_KEY:}
system.third.bd_secret = ${YPAT_BD_APP_SECRET:}

# 微信小程序
system.third.wx_appid = ${YPAT_WX_APP_ID:}
system.third.wx_appsecret = ${YPAT_WX_APP_SECRET:}

# 微信支付
system.third.wx_mchid = ${YPAT_WX_MCH_ID:}
system.third.wx_key = ${YPAT_WX_PAY_KEY:}

# 文件存储
# dev/pre 环境的实际值由 application.yml 的 system.third.fdfs_path 注入(更高优先级)。
# 这里保留严格校验形式作为兜底,确保即使 application.yml 未加载也能阻止 staging/prod 错配。
#   dev  : https://panghu.work/files       (在 application.yml 中,与预发共用同一 FastDFS 集群)
#   pre  : https://panghu.work/files       (在 application.yml 中)
#   pro  : ${YPAT_FDFS_PUBLIC_BASE_URL:?...} 强制注入,启动时校验
system.third.fdfs_path = ${YPAT_FDFS_PUBLIC_BASE_URL:?YPAT_FDFS_PUBLIC_BASE_URL is required}

# 微信公众号（PC/H5 端用）
system.third.wx_pub_appid = ${YPAT_WX_PUB_APP_ID:}
system.third.wx_pub_appsecret = ${YPAT_WX_PUB_APP_SECRET:}

# ===== 本地开发调试用，正式环境必须保持关闭 =====
system.third.sms.mock_enabled = ${YPAT_SMS_MOCK_ENABLED:false}
system.third.sms.mock_phone = ${YPAT_SMS_MOCK_PHONE:}
system.third.sms.mock_code = ${YPAT_SMS_MOCK_CODE:}
