#FastDFS配置begin-----------
fastdfs.connect_timeout_in_seconds = 10
fastdfs.network_timeout_in_seconds = 30
fastdfs.charset = UTF-8
fastdfs.http_anti_steal_token = false
# anti_steal_token 当前关闭，正式启用时通过环境或部署配置注入密钥，禁止写入仓库。
fastdfs.http_secret_key =
fastdfs.http_tracker_http_port = 8888
# 本地开发与预发环境共用同一套 FastDFS 集群，URL 前缀固定为 https://panghu.work/files，
# 这样本地返回的文件 URL 在浏览器/小程序里可直接访问，调试体验与预发一致。
fastdfs.tracker_servers = 82.156.14.216:22122
# 历史本地 docker tracker（如需离线调试可临时启用）
#fastdfs.tracker_servers = ypat-fastdfs-tracker:22122
#FastDFS配置end-----------
