<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorator="fragments/layout">
<head>
    <title>查询系统</title>

    <link th:href="@{/scripts/pagination/pagination.css}" rel="stylesheet" type="text/css" />
    <link th:href="@{/scripts/artDialog/default.css}" rel="stylesheet" type="text/css" />
    <link th:href="@{/scripts/My97DatePicker/skin/WdatePicker.css}" rel="stylesheet" type="text/css" />

    <script th:src="@{/scripts/pagination/jquery.pagination.js}"></script>
    <script th:src="@{/scripts/jquery.smartselect-1.1.min.js}"></script>
    <script th:src="@{/scripts/artDialog/artDialog.js}" />
    <script th:src="@{/scripts/My97DatePicker/WdatePicker.js}"></script>
    <script th:src="@{/scripts/manage/query/userlist.js}"></script>
</head>
<body>
<div class="locationLine" layout:fragment="prompt">
    当前位置：首页 &gt; <em >用户列表</em>
</div>
<div class="statisticBox w-782"  layout:fragment="content">
    <form id="queryForm" method="get">
    <div class="radiusGrayBox782">
        <div class="radiusGrayTop782"></div>
        <div class="radiusGrayMid782">
            <div class="dataSearchBox forUserRadius">
                <ul>
                    <li>
                        <label class="preInpTxt f-left">昵称：</label>
                        <input type="text" class="inp-list f-left w-200" value="" id="nickname" name="nickname"/>
                    </li>
                    <li>
                        <label class="preInpTxt f-left">手机号：</label>
                        <input type="text" class="inp-list f-left w-200" value="" id="mobile" name="mobile"/>
                    </li>
                    <li>
                        <label class="preInpTxt f-left">性别：</label>
                        <select name="gender" id="gender" class="inp-list f-left w-200">
                            <option value="">全部</option>
                            <option th:value="0" th:text="未知" ></option>
                            <option th:value="1" th:text="男" ></option>
                            <option th:value="2" th:text="女" ></option>
                        </select>
                    </li>
                    <li>
                        <label class="preInpTxt f-left">日&nbsp;&nbsp;&nbsp;期：</label>
                        <input  onfocus="WdatePicker({startDate:'%y-%M-%d 00:00:00',dateFmt:'yyyy-MM-dd HH:mm:ss'})" type="text" class="inp-list w-200 clear-mr f-left" id="regisdate" name="regisdate"/>
                    </li>
                    <li>
                        <label class="preInpTxt f-left">&nbsp;&nbsp;&nbsp;ID：</label>
                        <input type="text" class="inp-list f-left w-200" value="" id="id" name="id"/>
                    </li>
                    <li>
                        <a href="javascript:void(0)" class="blueBtn-62X30 f-right" id="searchBtn">查询</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    </form>
    <div class="newBtnBox">
    </div>
    <div class="dataDetailList mt-12">
        <table class="dataListTab">
            <thead>
            <tr>
                <th>ID</th>
                <th>昵称</th>
                <th>手机号</th>
                <th>微信</th>
                <th>QQ</th>
                <th>职业</th>
                <th>性别</th>
                <th>生日</th>
                <th>注册日期</th>
                <th>地区</th>
                <th>渠道</th>
            </tr>
            </thead>
            <tbody id="tbodyContent">
            </tbody>
        </table>
        <div class="tableFootLine">
            <div class="pagebarList pagination"/>
        </div>
    </div>
</div>
</body>
</html>
