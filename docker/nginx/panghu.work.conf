# YPAT 预发环境 — panghu.work 主机 nginx（完整版）
# 80 → 301 HTTPS, 443 SSL 反代到后端 + 前端静态（/var/www/panghu.work）

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name panghu.work www.panghu.work;
    return 301 https://$host$request_uri;
}

# HTTPS 主入口
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name panghu.work www.panghu.work;

    ssl_certificate /etc/nginx/ssl/panghu.work/panghu.work_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/panghu.work/panghu.work.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 100M;

    access_log /var/log/nginx/panghu.work.access.log;
    error_log /var/log/nginx/panghu.work.error.log;

    # API 网关（反代到 wap:8081）
    location /api/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # 后台管理（反代到 system-web:8082）
    location /admin/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Eureka 控制台（反代到 eureka:8761）
    location /eureka/ {
        proxy_pass http://127.0.0.1:8761/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastDFS 图片（反代到 storage:8888）
    location /files/ {
        proxy_pass http://127.0.0.1:8888/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 前端 H5 静态（默认，本地文件 /var/www/panghu.work）
    location / {
        root /var/www/panghu.work;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # HTML 不缓存
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # JS/CSS/图片缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }
}