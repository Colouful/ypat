# YPAT 内部 nginx (Docker 容器, 仅监听 80, 主机 nginx 反代到 127.0.0.1:8080)
# 主机 nginx 负责 TLS + 路径分发

server {
    listen 80;
    server_name localhost;

    # 由于 H5 与 API 已同域（https://panghu.work），不需要跨域
    # 如确实需要跨域，只允许明确域名

    client_max_body_size 100M;

    # server 级 root/index，所有 location 继承
    # （防止 try_files 内部重定向命中 .html$ 后走默认 /etc/nginx/html/）
    root /usr/share/nginx/html;
    index index.html;

    # API 路径
    location /api/ {
        proxy_pass http://wap:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后台管理 API
    location /admin/ {
        proxy_pass http://wap:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastDFS 图片
    location /files/ {
        proxy_pass http://ypat-fastdfs-storage:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 管理后台静态资源
    # 后台 SPA 由 admin-web 托管，index.html 会引用 /assets/*。
    # 必须优先代理到 admin-web，避免被下面的静态资源规则当作 H5 资源处理。
    location ^~ /assets/ {
        proxy_pass http://admin-web:8080/assets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 管理后台 SPA (admin-web)
    location / {
        proxy_pass http://admin-web:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HTML 不缓存
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 静态资源缓存（js/css/image/font）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ==================== Gzip 压缩 ====================
    # 文本资源压缩 60-80%，可减少传输体积
    # 排除：图片（已压缩）、视频、二进制流
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;          # 小于 1KB 不压缩（避免 overhead）
    gzip_proxied any;              # 对代理请求（前端 → 8080 → wap）也压缩
    gzip_comp_level 6;             # 压缩级别 1-9，6 平衡 CPU 与压缩率
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/rss+xml
        application/wasm
        image/svg+xml
        font/ttf
        font/otf;
    gzip_disable "msie6";          # IE6 不支持
}
