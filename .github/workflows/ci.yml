name: CI

on:
  pull_request:
    branches:
      - main
      - main2
  push:
    branches:
      - main
      - main2
  workflow_dispatch:

permissions:
  contents: read

env:
  # CI 中 production 构建使用非真实保留测试域名注入，不引用 staging 域名
  CI_PRODUCTION_API_URL: https://api.production-ci.example.invalid
  CI_PRODUCTION_FILES_URL: https://files.production-ci.example.invalid

jobs:
  # ============================================================
  # Frontend jobs
  # ============================================================
  frontend-development:
    name: frontend / development
    runs-on: ubuntu-latest
    env:
      VITE_APP_ENV: development
      VITE_API_BASE_URL: http://localhost:8081
      VITE_IMAGE_BASE_URL: http://localhost:8081/
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --registry=https://registry.npmjs.org

      - name: Create development env file
        run: |
          cp .env.development.example .env.development 2>/dev/null || true

      - name: Validate development env
        run: pnpm run env:validate:development

      - name: Type check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test

      - name: Build H5 development
        run: pnpm run build:h5

  frontend-staging:
    name: frontend / staging
    runs-on: ubuntu-latest
    env:
      VITE_APP_ENV: staging
      VITE_API_BASE_URL: https://panghu.work/api
      VITE_IMAGE_BASE_URL: https://panghu.work/files/
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --registry=https://registry.npmjs.org
      - name: Create staging env file
        run: cp .env.staging.example .env.staging
      - name: Validate staging env
        run: pnpm run env:validate:staging
      - name: Type check
        run: pnpm run type-check
      - name: Lint
        run: pnpm run lint
      - name: Unit tests
        run: pnpm run test
      - name: Build H5 staging
        run: pnpm run build:h5:staging
      - name: Build mp-weixin staging
        run: pnpm run build:mp-weixin:staging

  frontend-production:
    name: frontend / production
    runs-on: ubuntu-latest
    env:
      VITE_APP_ENV: production
      VITE_API_BASE_URL: ${{ env.CI_PRODUCTION_API_URL }}
      VITE_IMAGE_BASE_URL: ${{ env.CI_PRODUCTION_FILES_URL }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --registry=https://registry.npmjs.org
      - name: Create production env file
        run: cp .env.production.example .env.production
      - name: Inject CI test URLs
        run: |
          sed -i.bak "s|^VITE_API_BASE_URL=$|VITE_API_BASE_URL=${CI_PRODUCTION_API_URL}|" .env.production
          sed -i.bak "s|^VITE_IMAGE_BASE_URL=$|VITE_IMAGE_BASE_URL=${CI_PRODUCTION_FILES_URL}|" .env.production
          cat .env.production
      - name: Validate production env
        run: pnpm run env:validate:production
      - name: Type check
        run: pnpm run type-check
      - name: Lint
        run: pnpm run lint
      - name: Unit tests
        run: pnpm run test
      - name: Build H5 production
        run: pnpm run build:h5:production
      - name: Build mp-weixin production
        run: pnpm run build:mp-weixin:production
      - name: Scan production artifact for staging alias leakage
        run: |
          # 严禁 production 产物引用 staging 域名/IP
          set -euo pipefail
          if grep -RIn -E 'panghu\.work|82\.156\.14\.216' dist/ 2>/dev/null; then
            echo "ERROR: production artifact contains staging alias"; exit 1
          fi
          echo "✓ no staging alias in production artifact"

  # ============================================================
  # Backend jobs
  # ============================================================
  backend-test:
    name: backend / unit-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven
      - name: Maven test
        run: mvn test -Dmaven.test.skip=false -DskipTests=false

  backend-build-dev:
    name: backend / build-dev
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven
      - name: Maven build dev profile
        run: mvn clean package -Pdev -DskipTests -Dmaven.test.skip=false -DskipTests=false
      - name: Verify dev jar excludes pre/pro resources
        run: |
          set -euo pipefail
          for module in system-restapi system-wap system-web system-sso; do
            jar="system-${module#system-}/target/${module}-1.0-SNAPSHOT.jar"
            [ -f "$jar" ] || continue
            echo "Verifying $jar"
            if unzip -l "$jar" | grep -E "BOOT-INF/classes/(pre|pro)/"; then
              echo "ERROR: dev jar contains pre/pro resources"; exit 1
            fi
          done

  backend-build-pre:
    name: backend / build-pre
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven
      - name: Maven build pre profile
        run: mvn clean package -Ppre -DskipTests -Dmaven.test.skip=false -DskipTests=false
      - name: Verify pre jar excludes dev/pro resources
        run: |
          set -euo pipefail
          for module in system-restapi system-wap system-web system-sso; do
            jar="system-${module#system-}/target/${module}-1.0-SNAPSHOT.jar"
            [ -f "$jar" ] || continue
            echo "Verifying $jar"
            if unzip -l "$jar" | grep -E "BOOT-INF/classes/(dev|pro)/"; then
              echo "ERROR: pre jar contains dev/pro resources"; exit 1
            fi
          done

  backend-build-pro:
    name: backend / build-pro
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven
      - name: Maven build pro profile
        run: mvn clean package -Ppro -DskipTests -Dmaven.test.skip=false -DskipTests=false
      - name: Verify pro jar excludes dev/pre resources
        run: |
          set -euo pipefail
          for module in system-restapi system-wap system-web system-sso; do
            jar="system-${module#system-}/target/${module}-1.0-SNAPSHOT.jar"
            [ -f "$jar" ] || continue
            echo "Verifying $jar"
            if unzip -l "$jar" | grep -E "BOOT-INF/classes/(dev|pre)/"; then
              echo "ERROR: pro jar contains dev/pre resources"; exit 1
            fi
          done

  # ============================================================
  # Compose jobs
  # ============================================================
  compose-config:
    name: compose / config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install docker compose
        run: |
          # 假设 GitHub Actions runner 已有 docker
          docker compose version || true
      - name: Validate docker-compose.yml (development)
        run: docker compose config > /dev/null
      - name: Validate docker-compose.staging.yml
        run: docker compose -f docker-compose.staging.yml config > /dev/null
      - name: Validate docker-compose.production.yml
        run: docker compose -f docker-compose.production.yml config > /dev/null
      - name: Validate backend FastDFS staging compose
        run: docker compose -f backend/dev/fastdfs/docker-compose.staging.yml config > /dev/null
      - name: Validate FastDFS images use digest
        run: |
          set -euo pipefail
          # 严禁 latest 镜像
          if grep -E "image:\s+\S+:latest" docker-compose*.yml backend/dev/fastdfs/docker-compose*.yml 2>/dev/null; then
            echo "ERROR: :latest image not allowed"; exit 1
          fi
          # FastDFS 镜像必须 digest
          if ! grep -E "YPAT_FASTDFS_IMAGE.*@sha256" .env.example docker-compose*.yml backend/dev/fastdfs/docker-compose*.yml 2>/dev/null; then
            echo "WARN: FastDFS image digest not pinned"
          fi

  # ============================================================
  # Shell scripts validation
  # ============================================================
  shell-syntax:
    name: shell / syntax-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: |
          set -euo pipefail
          find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: ShellCheck (if available)
        run: |
          if command -v shellcheck &> /dev/null; then
            find scripts -name '*.sh' | xargs shellcheck
          else
            echo "shellcheck not installed, skipping"
          fi

  # ============================================================
  # Security job
  # ============================================================
  security:
    name: security / secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block committed private .env files
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)\.env($|\.local$|\..*\.local$)'; then
            echo "禁止提交真实私有 .env 文件。"; exit 1
          fi
      - name: Block committed private keys / keystores / certs
        run: |
          set -euo pipefail
          if git ls-files | grep -E '\.(jks|p12|pfx|key|pem)$'; then
            echo "禁止提交证书私钥或 keystore 文件。"; exit 1
          fi
          grep -R -n -E 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY' frontend backend backend-base .github scripts docs \
            --exclude-dir=node_modules --exclude-dir=target --exclude-dir=dist && exit 1 || true
      - name: Block hardcoded passwords
        run: |
          set -euo pipefail
          known_patterns=(
            "WNFSIDH""FIOWEF"
            "Li""123456\\."
            "DY""X~!@#\\$""123qwe"
            "tc""123456"
            "sso""secret0"
            "sso""secret1"
            "FastDFS""1234567890"
          )
          for pattern in "${known_patterns[@]}"; do
            if grep -R -n -E "$pattern" frontend backend backend-base .github scripts docs docker-compose.yml \
              --exclude-dir=node_modules --exclude-dir=target --exclude-dir=dist; then
              echo "ERROR: hardcoded password pattern matched"; exit 1
            fi
          done
      - name: Block :latest images in any compose
        run: |
          set -euo pipefail
          if grep -E "image:\s+\S+:latest" docker-compose*.yml backend/dev/fastdfs/docker-compose*.yml 2>/dev/null; then
            echo "ERROR: :latest image must be pinned to version or digest"; exit 1
          fi
      - name: Block production compose referencing staging
        run: |
          set -euo pipefail
          if [ -f docker-compose.production.yml ]; then
            if grep -E "panghu\.work|82\.156\.14\.216|www\.panghu\.work" docker-compose.production.yml; then
              echo "ERROR: production compose references staging host"; exit 1
            fi
          fi