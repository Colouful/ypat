# YPAT 内部 nginx (Docker 容器, 仅监听 80, 主机 nginx 反代到 127.0.0.1:8080)
# 主机 nginx 负责 TLS + 路径分发

server {
    listen 80;
    server_name localhost;

    # 由于 H5 与 API 已同域（https://panghu.work），不需要跨域
    # 如确实需要跨域，只允许明确域名

    client_max_body_size 100M;

    # API 路径
    location /api/ {
        proxy_pass http://wap:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后台管理
    location /admin/ {
        proxy_pass http://system-web:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastDFS 图片
    location /files/ {
        proxy_pass http://ypat-fastdfs-storage:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 前端 H5 静态资源 (默认)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /usr/share/nginx/html/index.html;
    }

    # HTML 不缓存
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }
}
