# YPAT 内部 nginx (Docker 容器, 仅监听 80, 主机 nginx 反代到 127.0.0.1:8080)
# 主机 nginx 负责 SSL + 路径分发

# API 反代 (解决跨域)
server {
    listen 80;
    server_name localhost;

    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header Access-Control-Allow-Headers '*' always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    client_max_body_size 100M;

    # API 路径
    location /api/ {
        proxy_pass http://wap:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后台管理
    location /admin/ {
        proxy_pass http://system-web:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Eureka 控制台
    location /eureka/ {
        proxy_pass http://eureka:8761/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastDFS 图片
    location /files/ {
        proxy_pass http://ypat-fastdfs-storage:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 前端 H5 静态资源 (默认)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /usr/share/nginx/html/index.html;
    }

    # HTML 不缓存
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }
}
