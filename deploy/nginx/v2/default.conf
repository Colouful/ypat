# YPAT 内部 nginx — backend-v2 切流配置
#
# PR-22 final: this file replaces
# /Users/lizhenwei/workspace/vueworkspace/ypat-workspace/docker/nginx/default.conf
# via scripts/apply-nginx-cutover.sh.
#
# Layout:
#   - /api/work/*   5%/25%/50%/100% phased to backend-v2
#   - /api/wallet/*  5%/25%/50%/100% phased to backend-v2
#   - /api/identity/*  5%/25%/50%/100% phased to backend-v2
#   - everything else /api/* stays on legacy wap
#   - /admin/* stays on legacy wap
#
# Operators change the split percentages, then `nginx -s reload`.
# No app restart, no JVM touch.

# ── Upstreams ───────────────────────────────────────────
upstream ypat_v2_backend {
    server backend-v2:8082 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream ypat_legacy_wap {
    server wap:8081 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# ── Cut-over split for backend-v2 modules ───────────────
# Initial: 5% v2 / 95% legacy. Edit + reload to advance phases.
split_clients "$request_id" $v2_work_backend {
    5%   ypat_v2_backend;
    95%  ypat_legacy_wap;
}

split_clients "$request_id" $v2_wallet_backend {
    5%   ypat_v2_backend;
    95%  ypat_legacy_wap;
}

split_clients "$request_id" $v2_identity_backend {
    5%   ypat_v2_backend;
    95%  ypat_legacy_wap;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;

    # ── backend-v2 paths (phased cut-over) ────────────────
    # ^~ matches exact prefix (V1.1 §2.1). Order matters: more
    # specific prefixes must come before less specific ones.
    location ^~ /api/work/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-ypat-backend     v2-current;
        proxy_pass http://$v2_work_backend;
        proxy_http_version 1.1;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }

    location ^~ /api/wallet/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-ypat-backend     v2-current;
        proxy_pass http://$v2_wallet_backend;
        proxy_http_version 1.1;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }

    location ^~ /api/identity/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-ypat-backend     v2-current;
        proxy_pass http://$v2_identity_backend;
        proxy_http_version 1.1;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }

    # ── WeChat Pay callback: public (Nginx-level IP ACL is
    # operator-side) but always goes to the legacy path because
    # backend-v2 doesn't speak the WeChat format yet (PR-20 ships
    # the contract, the WeChat SDK wiring is PR-20 follow-up). ──
    location /wxpay/ {
        proxy_pass http://wap:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Everything else /api/* stays on legacy wap ──────────
    location /api/ {
        proxy_pass http://wap:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Admin / files / static (unchanged) ─────────────────
    location /admin/ {
        proxy_pass http://wap:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /files/ {
        proxy_pass http://ypat-fastdfs-storage:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static H5 build
    location / {
        try_files $uri $uri/ /index.html;
    }
}