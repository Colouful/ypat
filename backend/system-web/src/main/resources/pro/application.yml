server:
  port: 8082
spring:
  http:
    multipart:
      max-request-size: 2MB
      max-file-size: 2MB
  redis:
    host: ${YPAT_REDIS_HOST:redis}
    port: ${YPAT_REDIS_PORT:6379}
    password: ${YPAT_REDIS_PASSWORD}
    pool:
      max-idle: 8
      min-idle: 0
      max-active: 8
      max-wait: -1
  jackson:
    time-zone: GMT+8
eureka:
  client:
    serviceUrl:
      defaultZone: ${YPAT_EUREKA_DEFAULT_ZONE:http://eureka:8761/eureka/}
  instance:
    preferIpAddress: true

##FeignClient超时设置
---
spring.cloud.loadbalancer.retry.enabled: false
ribbon.ConnectTimeout: 250
ribbon.ReadTimeout: 5000
ribbon.OkToRetryOnAllOperations: false
ribbon.MaxAutoRetriesNextServer: 0
ribbon.MaxAutoRetries: 0

# === Pro 环境 FastDFS 强校验 ===
system:
  third:
    fdfs_path: ${YPAT_FDFS_PUBLIC_BASE_URL:?YPAT_FDFS_PUBLIC_BASE_URL is required}
