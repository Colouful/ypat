# YPAT development environment
# 本地开发使用，端口仅绑 127.0.0.1，禁止公网访问
# 使用 docker compose up -d 启动
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${YPAT_LOCAL_MYSQL_ROOT_PASSWORD:?YPAT_LOCAL_MYSQL_ROOT_PASSWORD is required}"
      MYSQL_DATABASE: ypat
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${YPAT_LOCAL_MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/dev-init.sql:/docker-entrypoint-initdb.d/dev-init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${YPAT_LOCAL_REDIS_PASSWORD:?YPAT_LOCAL_REDIS_PASSWORD is required}"
    ports:
      - "127.0.0.1:${YPAT_LOCAL_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${YPAT_LOCAL_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  eureka:
    build:
      context: ./backend-base/base-eureka
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${YPAT_LOCAL_EUREKA_PORT:-8761}:8761"
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  restapi:
    build:
      context: ./backend/system-restapi
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "9081"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/ypat?characterEncoding=utf8&useSSL=false"
      SPRING_DATASOURCE_USERNAME: "${YPAT_DB_USERNAME:?YPAT_DB_USERNAME is required}"
      SPRING_DATASOURCE_PASSWORD: "${YPAT_DB_PASSWORD:?YPAT_DB_PASSWORD is required}"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: "${YPAT_LOCAL_REDIS_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      YPAT_FDFS_PUBLIC_BASE_URL: "${YPAT_FDFS_PUBLIC_BASE_URL:-http://localhost:8888}"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9081/health"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  wap:
    build:
      context: ./backend/system-wap
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${YPAT_LOCAL_WAP_PORT:-8081}:8081"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      # ca2a4653 起 wap 内部有 @Autowired Repository，需要直连 MySQL
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/ypat?characterEncoding=utf8&useSSL=false"
      SPRING_DATASOURCE_USERNAME: "${YPAT_DB_USERNAME:?YPAT_DB_USERNAME is required}"
      SPRING_DATASOURCE_PASSWORD: "${YPAT_DB_PASSWORD:?YPAT_DB_PASSWORD is required}"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: "${YPAT_LOCAL_REDIS_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      YPAT_FDFS_PUBLIC_BASE_URL: "${YPAT_FDFS_PUBLIC_BASE_URL:-http://localhost:8888}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka:
        condition: service_healthy
      restapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  system-web:
    build:
      context: ./backend/system-web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${YPAT_LOCAL_WEB_PORT:-8082}:8082"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: "${YPAT_LOCAL_REDIS_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      YPAT_FDFS_PUBLIC_BASE_URL: "${YPAT_FDFS_PUBLIC_BASE_URL:-http://localhost:8888}"
    depends_on:
      redis:
        condition: service_healthy
      eureka:
        condition: service_healthy
      restapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  admin-web:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        APP_ENV: docker
    restart: unless-stopped
    ports:
      - "127.0.0.1:18896:8080"
    depends_on:
      wap:
        condition: service_healthy
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist/build/h5:/usr/share/nginx/html:ro
    depends_on:
      wap:
        condition: service_healthy
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─────────────────────────────────────────────────────────────────
  # backend-v2 : the new modular monolith (Spring Boot 3.5 +
  # Java 21, Flyway 10, Modulith 1.4). PR-04 + PR-12 + PR-01b.
  # Reads / writes the same MySQL and Redis. First v2 service
  # on this network; PR-11 onwards migrates traffic from the
  # legacy wap / restapi to here.
  # ─────────────────────────────────────────────────────────────────
  backend-v2:
    build:
      context: .
      dockerfile: backend-v2/Dockerfile.runtime
      args:
        # Build arg feeds Dockerfile.runtime's COPY source.
        # The build host runs `mvn package` first (see
        # scripts/docker-build-backend-v2.sh) and drops the jar
        # into the build context as app.jar.
        JAR_SRC: backend-v2/target/backend-v2-1.0.0-SNAPSHOT.jar
    image: ypat-backend-v2:dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8092:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      YPAT_COS_REGION: ${YPAT_COS_REGION:-ap-guangzhou}
      YPAT_COS_BUCKET: ${YPAT_COS_BUCKET:-ypat-dev-placeholder}
      YPAT_COS_SECRET_ID: ${YPAT_COS_SECRET_ID:-dev-placeholder-id}
      YPAT_COS_SECRET_KEY: ${YPAT_COS_SECRET_KEY:-dev-placeholder-key}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ypat_ypat-net
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/api/work/list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  mysql_data:
  redis_data:

# The ypat_ypat-net network is owned by the ypat-workspace
# docker-compose project (this file is consumed by the legacy
# frontend + backend stack). Marking it external: true tells
# THIS project not to try to create it; backend-v2 joins it
# and talks to mysql / redis by hostname.
networks:
  ypat_ypat-net:
    name: ypat_ypat-net
    external: true