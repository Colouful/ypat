# YPAT 预发环境 Compose 配置
# 收紧端口：仅监听 127.0.0.1，禁止公网访问

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${YPAT_LOCAL_MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: ypat
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${YPAT_LOCAL_MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ypat_ypat-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${YPAT_LOCAL_REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:${YPAT_LOCAL_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${YPAT_LOCAL_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ypat_ypat-net

  eureka:
    build:
      context: ./backend-base/base-eureka
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${YPAT_LOCAL_EUREKA_PORT:-8761}:8761"
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - ypat_ypat-net

  restapi:
    build:
      context: ./backend/system-restapi
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "9081"
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/ypat?characterEncoding=utf8&useSSL=false"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "${YPAT_LOCAL_MYSQL_ROOT_PASSWORD}"
      SPRING_REDIS_PASSWORD: "${YPAT_LOCAL_REDIS_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    command: ["java", "-Djava.security.egd=file:/dev/./urandom", "-Dspring.profiles.active=pre", "-jar", "app.jar"]
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9081/health"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - ypat_ypat-net

  wap:
    build:
      context: ./backend/system-wap
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${YPAT_LOCAL_WAP_PORT:-8081}:8081"
    environment:
      TZ: Asia/Shanghai
      SPRING_REDIS_PASSWORD: "${YPAT_LOCAL_REDIS_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      YPAT_FDFS_PUBLIC_BASE_URL: "${YPAT_FDFS_PUBLIC_BASE_URL}"
    command: ["java", "-Djava.security.egd=file:/dev/./urandom", "-Dspring.profiles.active=pre", "-jar", "app.jar"]
    depends_on:
      redis:
        condition: service_healthy
      eureka:
        condition: service_healthy
      restapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - ypat_ypat-net

  system-web:
    build:
      context: ./backend/system-web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${YPAT_LOCAL_WEB_PORT:-8082}:8082"
    environment:
      TZ: Asia/Shanghai
      SPRING_REDIS_PASSWORD: "${YPAT_LOCAL_REDIS_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    command: ["java", "-Djava.security.egd=file:/dev/./urandom", "-Dspring.profiles.active=pre", "-jar", "app.jar"]
    depends_on:
      redis:
        condition: service_healthy
      eureka:
        condition: service_healthy
      restapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - ypat_ypat-net

networks:
  ypat_ypat-net:
    name: ypat_ypat-net
    driver: bridge

volumes:
  mysql_data:
  redis_data: