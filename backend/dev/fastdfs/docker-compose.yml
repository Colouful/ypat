# FastDFS 本地开发环境（Apple Silicon 原生 arm64）
# 镜像: ygqygq2/fastdfs-nginx (多架构原生支持)
# 用法:
#   cd backend/dev/fastdfs
#   docker compose up -d
#
# 镜像的 entrypoint.sh 通过 CMD 第一个位置参数（tracker|storage|monitor）选择角色，
# 所以 command 必须传 "tracker" 或 "storage"（不是 env）。

services:
  fastdfs-tracker:
    image: ygqygq2/fastdfs-nginx:latest
    container_name: ypat-fastdfs-tracker
    hostname: fastdfs-tracker
    command: ["tracker"]
    volumes:
      - ./tracker_data:/var/fdfs
    networks:
      - fastdfs-net
    ports:
      - "22122:22122"
    restart: unless-stopped

  fastdfs-storage:
    image: ygqygq2/fastdfs-nginx:latest
    container_name: ypat-fastdfs-storage
    hostname: fastdfs-storage
    depends_on:
      - fastdfs-tracker
    environment:
      TRACKER_SERVER: fastdfs-tracker:22122
    command: ["storage"]
    volumes:
      - ./storage_data:/var/fdfs
    networks:
      - fastdfs-net
    ports:
      - "23000:23000"
      - "8888:8080"   # 镜像内 nginx 听 8080
    restart: unless-stopped

networks:
  fastdfs-net:
    driver: bridge