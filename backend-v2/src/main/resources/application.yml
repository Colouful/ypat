# backend-v2 base configuration.
#
# PR-04 was the skeleton. PR-07a enabled the Flyway deps.
# PR-07b committed the real V1 baseline. THIS PR (PR-01b) flips
# the switch so the Spring Boot context actually applies the
# baseline at startup and refuses to boot on checksum drift.

server:
  port: 8082

spring:
  application:
    name: ypat-backend-v2

  # ── DataSource: env-driven. Production override via
  # application-{profile}.yml or env vars.
  datasource:
    url: ${YPAT_DATASOURCE_URL:jdbc:mysql://mysql:3306/ypat?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${YPAT_DATASOURCE_USERNAME:ypat_dev}
    password: ${YPAT_DATASOURCE_PASSWORD:ypat_dev_password_change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── Flyway: PR-07b flips enabled to true against the real V1
  # baseline. PR-01b locks the runtime knobs.
  flyway:
    enabled: true
    # baseline-on-migrate=true: against a non-empty schema (the
    # legacy t_work / t_user / etc. are already there), Flyway
    # creates the flyway_schema_history table and baselines at
    # version 1 with no applied migrations recorded. V1__baseline_schema.sql
    # then matches what is already in the DB, so no ALTERs run.
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    sql-migration-suffixes: .sql
    # validate-on-migrate=true: refuse to start if any committed
    # migration's checksum changes (i.e. someone edited a committed
    # SQL file). This catches the "PR rewrites V1 to match a different
    # schema" foot-gun at boot time.
    validate-on-migrate: true
    # baseline-descriptor-version: skip — the default handles 1.

  # ── ddl-auto: stays `none` here. PR-01b does NOT flip to validate
  # because backend-v2 has zero JPA entities yet. validate-without-
  # entities is a no-op but validate-with-drifted-entities would
  # refuse to boot. The flip lands with the first entity-bearing
  # PR (PR-15 follow-up).
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        # Hibernate 6 (Spring Boot 3.5) requires explicit dialect;
        # autodetect was removed in 6.0.
        dialect: org.hibernate.dialect.MySQLDialect

# ── Storage (PR-10). Profile-specific yml files override
# these with real credentials. The fail-fast syntax aborts
# startup on a missing key.
ypat:
  storage:
    write-provider: COS
    read-fallback: COS,FASTDFS
    cos:
      region: ${YPAT_COS_REGION:ap-guangzhou}
      bucket: ${YPAT_COS_BUCKET:ypat-dev-placeholder}
      secret-id: ${YPAT_COS_SECRET_ID:?YPAT_COS_SECRET_ID is required}
      secret-key: ${YPAT_COS_SECRET_KEY:?YPAT_COS_SECRET_KEY is required}