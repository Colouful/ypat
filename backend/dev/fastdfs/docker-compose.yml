# FastDFS — 预发环境
# tracker:22122 (内网) + storage:23000 (内网) + storage nginx 8888 (主机端口,浏览器访问图片)
# 共享主 ypat-net 网络，wap/web 容器可直接用主机名 fastdfs-tracker:22122
#
# 启动: docker compose -f backend/dev/fastdfs/docker-compose.yml up -d
# 停止: docker compose -f backend/dev/fastdfs/docker-compose.yml down

services:
  fastdfs-tracker:
    image: ygqygq2/fastdfs-nginx:latest
    container_name: ypat-fastdfs-tracker
    hostname: fastdfs-tracker
    command: ["tracker"]
    volumes:
      - ./tracker_data:/var/fdfs
    networks:
      - ypat-net
    ports:
      - "22122:22122"
    restart: unless-stopped

  fastdfs-storage:
    image: ygqygq2/fastdfs-nginx:latest
    container_name: ypat-fastdfs-storage
    hostname: fastdfs-storage
    depends_on:
      - fastdfs-tracker
    environment:
      TRACKER_SERVER: fastdfs-tracker:22122
    command: ["storage"]
    volumes:
      - ./storage_data:/var/fdfs
    networks:
      - ypat-net
    ports:
      - "23000:23000"
      - "8888:8080"
    restart: unless-stopped

networks:
  ypat-net:
    external: true
    name: ypat_ypat-net
