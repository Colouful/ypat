services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${YPAT_LOCAL_MYSQL_ROOT_PASSWORD:-ypat_dev_password_change_me}"
      MYSQL_DATABASE: ypat
      TZ: Asia/Shanghai
    ports:
      - "${YPAT_LOCAL_MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ypat-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${YPAT_LOCAL_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ypat-net

  eureka:
    build:
      context: ./backend-base/base-eureka
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${YPAT_LOCAL_EUREKA_PORT:-8761}:8761"
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - ypat-net

  restapi:
    build:
      context: ./backend/system-restapi
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${YPAT_LOCAL_RESTAPI_PORT:-9081}:9081"
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/ypat?characterEncoding=utf8&useSSL=false"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "${YPAT_LOCAL_MYSQL_ROOT_PASSWORD:-ypat_dev_password_change_me}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9081/health"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - ypat-net

  wap:
    build:
      context: ./backend/system-wap
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${YPAT_LOCAL_WAP_PORT:-8081}:8081"
    environment:
      TZ: Asia/Shanghai
      SPRING_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      redis:
        condition: service_healthy
      eureka:
        condition: service_healthy
      restapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks:
      - ypat-net

  system-web:
    build:
      context: ./backend/system-web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${YPAT_LOCAL_WEB_PORT:-8082}:8082"
    environment:
      TZ: Asia/Shanghai
      SPRING_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      redis:
        condition: service_healthy
      eureka:
        condition: service_healthy
      restapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - ypat-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${YPAT_LOCAL_NGINX_API_PORT:-8088}:8088"
      - "${YPAT_LOCAL_NGINX_WEB_PORT:-5189}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist/build/h5:/usr/share/nginx/html:ro
    depends_on:
      wap:
        condition: service_healthy
    networks:
      - ypat-net

volumes:
  mysql_data:
  redis_data:

networks:
  ypat-net:
    driver: bridge
