# FastDFS — development environment
#
# 本地开发使用，端口绑 127.0.0.1

name: ypat-development

services:
  fastdfs-tracker:
    image: ygqygq2/fastdfs-nginx@sha256:076ee9c1ab73f16d81b28f6f8e0405e67446994f9541020115d5e2f546cbde48
    container_name: ypat-fastdfs-tracker
    hostname: fastdfs-tracker
    command: ["tracker"]
    volumes:
      - ./tracker_data:/var/fdfs
    networks:
      - ypat_ypat-net
    restart: unless-stopped

  fastdfs-storage:
    image: ygqygq2/fastdfs-nginx@sha256:076ee9c1ab73f16d81b28f6f8e0405e67446994f9541020115d5e2f546cbde48
    container_name: ypat-fastdfs-storage
    hostname: fastdfs-storage
    depends_on:
      - fastdfs-tracker
    environment:
      TRACKER_SERVER: fastdfs-tracker:22122
    command: ["storage"]
    volumes:
      - ./storage_data:/var/fdfs
    networks:
      - ypat_ypat-net
    ports:
      - "127.0.0.1:8888:8080"
    restart: unless-stopped

networks:
  ypat_ypat-net:
    name: ypat_ypat-net
    external: true